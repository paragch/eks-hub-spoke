apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infra-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]

  generators:
    - clusters:
        selector:
          matchLabels:
            cluster-role: spoke

  template:
    metadata:
      name: '{{.name}}-cert-manager'
      labels:
        environment: '{{index .metadata.labels "environment"}}'
    spec:
      project: infra
      source:
        repoURL: YOUR_REPO_URL
        targetRevision: HEAD
        path: 'gitops/infra/cert-manager'
        helm:
          valueFiles:
            - 'values-{{index .metadata.labels "environment"}}.yaml'
      destination:
        server: '{{.server}}'
        namespace: cert-manager
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
