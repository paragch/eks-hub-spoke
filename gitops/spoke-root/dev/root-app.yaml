# Root Application deployed by Hub ArgoCD to the dev spoke
# This "app of apps" lets the dev spoke's ArgoCD manage its own apps
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: apps
  source:
    repoURL: YOUR_REPO_URL
    targetRevision: HEAD
    path: gitops/apps/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
