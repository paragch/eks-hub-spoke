# ArgoCD Hub values — HA mode with internet-facing NLB (AWS Load Balancer Controller)
# Uses external NLB in IP target mode so the LBC manages the load balancer rather
# than the legacy in-tree cloud provider.
global:
  # Image tag is managed by chart version
  {}

server:
  replicas: 2
  service:
    type: LoadBalancer
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: "external"
      service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
      service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
  insecure: true
  extraArgs:
    - --insecure

repoServer:
  replicas: 2

applicationSet:
  replicas: 2
  enabled: true

notifications:
  enabled: true

dex:
  enabled: false

redis:
  enabled: true

configs:
  params:
    server.insecure: "true"
  cm:
    application.resourceTrackingMethod: annotation

controller:
  replicas: 1
