# ArgoCD Hub values — HA mode with LoadBalancer
global:
  # Image tag is managed by chart version
  {}

server:
  replicas: 2
  service:
    type: LoadBalancer
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
      service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
  insecure: true
  extraArgs:
    - --insecure

repoServer:
  replicas: 2

applicationSet:
  replicas: 2
  enabled: true

notifications:
  enabled: true

dex:
  enabled: false

redis:
  enabled: true

configs:
  params:
    server.insecure: "true"
  cm:
    application.resourceTrackingMethod: annotation

controller:
  replicas: 1
